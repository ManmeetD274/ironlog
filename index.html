<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>IronLog – Workout Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ APP SHELL ═══════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ── LOG SCREEN ──────────────────────────────────────────────────── -->
  <div class="screen active" id="screen-log">
    <div class="screen-header">
      <div class="row sb">
        <h1><span class="logo-mark">⚡</span> IronLog</h1>
        <button class="btn btn-sm btn-ghost" onclick="openExercisePicker()" style="display:none" id="quick-add-btn">+ Add</button>
      </div>
      <div class="date-strip" id="date-strip" style="margin-top:12px"></div>
    </div>
    <!-- Rest Timer Banner -->
    <div id="rest-banner" style="display:none;background:var(--bg3);border-bottom:1px solid var(--border);padding:10px 20px;align-items:center;justify-content:space-between;gap:12px">
      <div>
        <div style="font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Rest Timer</div>
        <div id="rest-time" class="timer-display" style="font-size:1.4rem;text-align:left">1:30</div>
      </div>
      <div class="row" style="gap:8px">
        <button class="btn btn-sm btn-muted" onclick="state.restSeconds+=30;document.getElementById('rest-time').textContent=formatTime(state.restSeconds)">+30s</button>
        <button class="btn btn-sm btn-danger" onclick="hideRestTimer()">Skip</button>
      </div>
    </div>
    <div class="screen-body" id="log-body"></div>
  </div>

  <!-- ── HISTORY SCREEN ─────────────────────────────────────────────── -->
  <div class="screen" id="screen-history">
    <div class="screen-header">
      <h1>History</h1>
    </div>
    <div class="screen-body" id="history-body"></div>
  </div>

  <!-- ── CLIENTS SCREEN ────────────────────────────────────────────── -->
  <div class="screen" id="screen-clients">
    <div class="screen-header">
      <div class="row sb">
        <h1>Clients</h1>
        <button class="btn btn-sm" onclick="openAddClient()">+ Add</button>
      </div>
    </div>
    <div class="screen-body" id="clients-body"></div>
  </div>

  <!-- ── PROFILE SCREEN ────────────────────────────────────────────── -->
  <div class="screen" id="screen-profile">
    <div class="screen-header">
      <h1>Profile</h1>
    </div>
    <div class="screen-body" id="profile-body"></div>
  </div>

  <!-- ── BOTTOM NAV ─────────────────────────────────────────────────── -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-log" onclick="switchTab('log')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Log
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      History
    </button>
    <button class="nav-btn" id="nav-clients" onclick="switchTab('clients')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clients
    </button>
    <button class="nav-btn" id="nav-profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Me
    </button>
  </nav>
</div>

<!-- ═══ OVERLAYS ═══════════════════════════════════════════════════════ -->

<!-- Exercise Picker -->
<div class="overlay" id="picker-overlay" onclick="if(event.target===this)closeOverlay('picker-overlay')">
  <div class="sheet" style="height:92dvh">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Add Exercises</h2>
      <button class="close-btn" onclick="closeOverlay('picker-overlay')">✕</button>
    </div>
    <div class="sheet-body" id="picker-body" style="display:flex;flex-direction:column;gap:0"></div>
  </div>
</div>

<!-- Workout Detail -->
<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeOverlay('detail-overlay')">
  <div class="sheet" style="height:90dvh">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Workout Detail</h2>
      <button class="close-btn" onclick="closeOverlay('detail-overlay')">✕</button>
    </div>
    <div class="sheet-body" id="detail-body"></div>
  </div>
</div>

<!-- Add Client -->
<div class="overlay" id="add-client-overlay" onclick="if(event.target===this)closeOverlay('add-client-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>New Client</h2>
      <button class="close-btn" onclick="closeOverlay('add-client-overlay')">✕</button>
    </div>
    <div class="sheet-body">
      <form id="client-form" onsubmit="event.preventDefault();saveClient()">
        <div class="input-group">
          <label>Name *</label>
          <input type="text" id="client-name" placeholder="e.g. Rahul Sharma" required autocomplete="off">
        </div>
        <div class="input-group">
          <label>Goal</label>
          <input type="text" id="client-goal" placeholder="e.g. Fat loss, Muscle gain" autocomplete="off">
        </div>
        <div class="input-group">
          <label>Notes</label>
          <textarea id="client-notes" placeholder="Injuries, preferences, schedule…" rows="3" style="resize:none"></textarea>
        </div>
        <button type="submit" class="btn btn-full" style="margin-top:8px">Save Client</button>
      </form>
    </div>
  </div>
</div>

<!-- Client Detail -->
<div class="overlay" id="client-detail-overlay" onclick="if(event.target===this)closeOverlay('client-detail-overlay')">
  <div class="sheet" style="height:90dvh">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Client</h2>
      <button class="close-btn" onclick="closeOverlay('client-detail-overlay')">✕</button>
    </div>
    <div class="sheet-body" id="client-detail-body"></div>
  </div>
</div>

<!-- Custom Exercise -->
<div class="overlay" id="custom-ex-overlay" onclick="if(event.target===this)closeOverlay('custom-ex-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Custom Exercise</h2>
      <button class="close-btn" onclick="closeOverlay('custom-ex-overlay')">✕</button>
    </div>
    <div class="sheet-body">
      <form id="custom-ex-form" onsubmit="event.preventDefault();saveCustomExercise()">
        <div class="input-group">
          <label>Exercise Name *</label>
          <input type="text" id="ce-name" placeholder="e.g. Viking Press" required autocomplete="off">
        </div>
        <div class="input-group">
          <label>Muscle Group</label>
          <select id="ce-muscle">
            <option>Chest</option><option>Back</option><option>Shoulders</option>
            <option>Biceps</option><option>Triceps</option><option>Quads</option>
            <option>Hamstrings</option><option>Glutes</option><option>Calves</option>
            <option>Abs</option><option>Forearms</option><option>Cardio</option><option>Full Body</option>
          </select>
        </div>
        <div class="input-group">
          <label>Equipment</label>
          <select id="ce-equip">
            <option>Barbell</option><option>Dumbbell</option><option>Cable</option>
            <option>Machine</option><option>Bodyweight</option><option>Kettlebell</option>
            <option>Band</option><option>EZ Bar</option><option>Other</option>
          </select>
        </div>
        <button type="submit" class="btn btn-full" style="margin-top:8px">Add Exercise</button>
      </form>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="exercises.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
</body>
</html>
